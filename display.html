<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Atendimento</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">
  <style>
    .material-symbols-rounded {
      vertical-align: middle;
      font-size: 1.25em;
    }

    .coord-nav-icon {
      margin-right: 8px;
      font-size: 1.25rem;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --navy: #071D41;
      --blue: #1351B4;
      --blue2: #2670E8;
      --blue-light: #D4E5FF;
      --green: #168821;
      --green2: #1b9926;
      --yellow: #FFCD07;
      --red: #E52207;
      --bg: #F0F4FA;
      --surface: #FFFFFF;
      --border: #C5D4EB;
      --txt: #1B1B1B;
      --muted: #636363;
      --stripe: #1351B4;
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--txt);
      display: grid;
      grid-template-rows: 76px 52px 1fr 84px 72px;
      height: 100vh;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      cursor: pointer;
      transition: opacity .5s ease;
    }

    #startOverlay.fade {
      opacity: 0;
      pointer-events: none
    }

    .ov-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
    }

    .ov-logo-bar {
      width: 52px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--green) 33%, var(--yellow) 33% 66%, var(--blue2) 66%);
    }

    .ov-logo-txt {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .5);
    }

    .ov-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .15);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: breathe 2.5s ease-in-out infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        border-color: rgba(255, 255, 255, .15);
        box-shadow: 0 0 0 0 transparent
      }

      50% {
        border-color: var(--yellow);
        box-shadow: 0 0 24px 4px rgba(255, 205, 7, .2)
      }
    }

    .ov-icon svg {
      width: 32px;
      height: 32px;
      stroke: rgba(255, 255, 255, .5);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .ov-cta {
      font-size: .95rem;
      font-weight: 500;
      color: rgba(255, 255, 255, .55);
      letter-spacing: .05em;
    }

    #flashVeil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      background: var(--blue);
    }

    #flashVeil.flash {
      animation: veil .5s ease-out forwards
    }

    @keyframes veil {
      0% {
        opacity: .18
      }

      100% {
        opacity: 0
      }
    }

    header {
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--green) 0% 33%, var(--yellow) 33% 66%, var(--blue2) 66% 100%);
    }

    .hd-brand {
      display: flex;
      align-items: center;
      gap: 1.1rem;
    }

    .hd-emblem {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .hd-emblem img {
      height: 90px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .hd-texts {
      display: flex;
      flex-direction: column;
      gap: .15rem
    }

    .hd-main {
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #FFFFFF
    }

    .hd-sub {
      font-size: .65rem;
      font-weight: 400;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .45)
    }

    .hd-right {
      display: flex;
      align-items: center;
      gap: 1.75rem
    }

    .hd-fila {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .5);
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    #filaCount {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .9rem;
      font-weight: 700;
      color: var(--yellow);
    }

    .hd-clock {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.05rem;
      font-weight: 700;
      color: rgba(255, 255, 255, .9);
      letter-spacing: .05em;
    }

    .hd-previsao {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding-right: 1.25rem;
      margin-right: 0.25rem;
    }

    #previsaoHora {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--blue-light);
      margin-top: 0.15rem;
    }

    main {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    main::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .4;
      pointer-events: none;
    }

    #idleWrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .idle-dots {
      display: flex;
      gap: .5rem
    }

    .idle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
    }

    .idle-dot:nth-child(1) {
      animation: blink 1.4s .0s ease-in-out infinite
    }

    .idle-dot:nth-child(2) {
      animation: blink 1.4s .2s ease-in-out infinite
    }

    .idle-dot:nth-child(3) {
      animation: blink 1.4s .4s ease-in-out infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: .3;
        transform: scale(1)
      }

      50% {
        opacity: 1;
        transform: scale(1.4);
        background: var(--blue)
      }
    }

    .idle-txt {
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    #callWrap {
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .call-top-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--blue);
      background: rgba(19, 81, 180, .08);
      border: 1px solid rgba(19, 81, 180, .2);
      padding: .35rem 1.1rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    #nomeDisplay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: .65rem;
    }

    .call-nome {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 700;
      color: var(--navy);
      line-height: 1.05;
      letter-spacing: -.01em;
      text-align: center;
      max-width: 90vw;
      word-break: break-word;
    }

    .call-nome.arrive {
      animation: arrive .5s cubic-bezier(.22, 1, .36, 1) both
    }

    .senha-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--blue);
      background: rgba(19, 81, 180, .07);
      border: 1.5px solid rgba(19, 81, 180, .18);
      padding: .3rem 1.25rem;
      border-radius: 100px;
    }

    #senhaNum {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(8rem, 18vw, 16rem);
      font-weight: 700;
      line-height: 1;
      color: var(--blue);
      letter-spacing: -.02em;
      will-change: transform, opacity;
    }

    #senhaNum.arrive {
      animation: arrive .5s cubic-bezier(.22, 1, .36, 1) both
    }

    @keyframes arrive {
      from {
        opacity: 0;
        transform: translateY(20px) scale(.94);
        filter: blur(8px)
      }

      to {
        opacity: 1;
        transform: none;
        filter: none
      }
    }

    @keyframes callingPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 transparent
      }

      50% {
        box-shadow: 0 0 0 14px rgba(19, 81, 180, .12)
      }
    }

    #callWrap.calling #senhaNum,
    #callWrap.calling .call-nome {
      animation: callingPulse 1.1s ease-in-out infinite
    }

    @media(min-width:2560px) {
      #senhaNum {
        font-size: clamp(12rem, 22vw, 22rem)
      }

      .call-nome {
        font-size: clamp(4rem, 9vw, 8rem)
      }

      #mesaNum {
        font-size: clamp(4rem, 8vw, 7rem)
      }

      #dicasText {
        font-size: clamp(1.4rem, 3vw, 2.4rem)
      }
    }

    .sep {
      width: 320px;
      height: 3px;
      margin: 1.75rem 0 1.5rem;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      position: relative;
    }

    .sep::after {
      content: '';
      position: absolute;
      left: 50%;
      top: -1px;
      transform: translateX(-50%);
      width: 60px;
      height: 4px;
      background: var(--green);
      border-radius: 2px;
    }

    .call-dir-label {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .75rem;
    }

    #mesaNum {
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 800;
      color: var(--green);
    }

    #rechamadaBadge {
      margin-top: 1.25rem;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .35rem 1rem;
      border-radius: 100px;
      background: rgba(229, 34, 7, .08);
      border: 1px solid rgba(229, 34, 7, .3);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--red);
    }

    #rechamadaBadge.hidden {
      display: none
    }

    #proximasWrap {
      position: absolute;
      bottom: 1.75rem;
      right: 2.5rem;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .45rem;
    }

    .prox-label {
      font-size: .55rem;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .prox-chips {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: .25rem
    }

    .prox-chip {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--txt);
      opacity: .55;
      line-height: 1.2;
      letter-spacing: .01em;
      text-transform: uppercase;
    }

    .idle-stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 1.75rem;
    }

    .idle-stat {
      text-align: center
    }

    .idle-stat-n {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--blue);
      line-height: 1;
    }

    .idle-stat-l {
      font-size: .55rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: .3rem;
    }

    .balcoes-strip {
      background: var(--navy);
      border-bottom: 1px solid rgba(255, 255, 255, .1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .85rem;
      padding: 0 2.5rem;
    }

    .bs-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .14rem;
      padding: .32rem .95rem;
      border-radius: 8px;
      border: 1.5px solid transparent;
      min-width: 88px;
      transition: all .4s ease;
    }

    .bs-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .78rem;
      font-weight: 700
    }

    .bs-sub {
      font-size: .52rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase
    }

    .bs-card.b-inativo {
      background: rgba(255, 255, 255, .04);
      border-color: rgba(255, 255, 255, .07)
    }

    .bs-card.b-inativo .bs-num,
    .bs-card.b-inativo .bs-sub {
      color: rgba(255, 255, 255, .2)
    }

    .bs-card.b-disponivel {
      background: rgba(22, 136, 33, .16);
      border-color: rgba(22, 136, 33, .38)
    }

    .bs-card.b-disponivel .bs-num {
      color: #5ee870
    }

    .bs-card.b-disponivel .bs-sub {
      color: rgba(94, 232, 112, .55)
    }

    .bs-card.b-atendendo {
      background: rgba(229, 34, 7, .14);
      border-color: rgba(229, 34, 7, .34)
    }

    .bs-card.b-atendendo .bs-num,
    .bs-card.b-atendendo .bs-sub {
      color: #ff7265
    }

    @keyframes bsPulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .6;
        transform: scale(.97)
      }
    }

    footer {
      background: var(--navy);
      border-top: 1px solid rgba(255, 255, 255, .08);
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 2rem;
      overflow: hidden;
    }

    .ft-label {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .35);
      white-space: nowrap;
      margin-right: 1.5rem;
      flex-shrink: 0;
    }

    #strip {
      display: flex;
      gap: .6rem;
      align-items: center;
      flex: 1;
      overflow: hidden
    }

    .chip {
      display: flex;
      align-items: center;
      gap: .55rem;
      padding: .3rem .75rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, .1);
      background: rgba(255, 255, 255, .04);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chip:first-child {
      border-color: rgba(255, 205, 7, .3);
      background: rgba(255, 205, 7, .08)
    }

    .chip-s {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .9rem;
      font-weight: 700;
      color: rgba(255, 255, 255, .85)
    }

    .chip:first-child .chip-s {
      color: var(--yellow)
    }

    .chip-b {
      font-size: .68rem;
      color: rgba(255, 255, 255, .4)
    }

    .chip-r {
      font-size: .6rem;
      padding: .1rem .3rem;
      background: rgba(229, 34, 7, .2);
      color: #ff7c6b;
      border-radius: 3px
    }

    #dicasBar {
      background: #FFFFFF;
      border-top: 3px solid var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 0 3rem;
    }

    #dicasText {
      font-size: clamp(1rem, 2.2vw, 1.6rem);
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0;
      text-transform: none;
      text-align: center;
      line-height: 1.25;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/autoUpdate.js"></script>
</head>

<body>

  <div id="startOverlay">
    <div class="ov-logo">
      <div class="ov-logo-bar"></div>
      <div class="ov-logo-txt">Sistema de Atendimento</div>
    </div>
    <div class="ov-icon">
      <svg viewBox="0 0 24 24">
        <path
          d="M15.536 8.464a5 5 0 0 1 0 7.072M12 12h.01M4.929 4.929C3.12 6.738 2 9.24 2 12c0 5.523 4.477 10 10 10s10-4.477 10-10S17.523 2 12 2c-2.76 0-5.262 1.12-7.071 2.929" />
      </svg>
    </div>
    <div class="ov-cta">Clique para ativar o som</div>
  </div>

  <div id="flashVeil"></div>

  <header>
    <div class="hd-brand">
      <div class="hd-emblem">
        <img src="https://cadunico.dataprev.gov.br/portal/static/media/marca-cadunico-2023-branco.106ed156.png"
          alt="Cadastro Único">
      </div>
    </div>
    <div class="hd-right">
      <div class="hd-previsao">
        Estimativa:
        <span id="previsaoHora">--:--</span>
      </div>

      <div class="hd-fila">
        Na fila: <span id="filaCount">—</span>
      </div>
      <div class="hd-clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div class="balcoes-strip" id="balcoesStrip">
    <div class="bs-card b-inativo"><span class="bs-num">M1</span><span class="bs-sub">inativo</span></div>
    <div class="bs-card b-inativo"><span class="bs-num">M2</span><span class="bs-sub">inativo</span></div>
    <div class="bs-card b-inativo"><span class="bs-num">M3</span><span class="bs-sub">inativo</span></div>
    <div class="bs-card b-inativo"><span class="bs-num">M4</span><span class="bs-sub">inativo</span></div>
    <div class="bs-card b-inativo"><span class="bs-num">M5</span><span class="bs-sub">inativo</span></div>
    <div class="bs-card b-inativo"><span class="bs-num">M6</span><span class="bs-sub">inativo</span></div>
  </div>

  <main>
    <div id="idleWrap">
      <div class="idle-dots">
        <div class="idle-dot"></div>
        <div class="idle-dot"></div>
        <div class="idle-dot"></div>
      </div>
      <div class="idle-txt">Aguardando chamada</div>
      <div class="idle-stats" id="idleStats" style="display:none">
        <div class="idle-stat">
          <div class="idle-stat-n" id="idleAtend">0</div>
          <div class="idle-stat-l">em atendimento</div>
        </div>
        <div class="idle-stat">
          <div class="idle-stat-n" id="idleFila">0</div>
          <div class="idle-stat-l">na fila</div>
        </div>
      </div>
    </div>

    <div id="callWrap">
      <div class="call-top-label" id="callTopLabel">Senha Chamada</div>
      <div id="nomeDisplay">
        <div class="call-nome" id="nomeCallEl"></div>
        <div class="senha-badge" id="senhaBadgeEl"></div>
      </div>
      <div id="senhaNum">--</div>
      <div class="sep"></div>
      <div class="call-dir-label" id="callDirLabel">Dirija-se à</div>
      <div id="mesaNum">Mesa --</div>
      <div id="rechamadaBadge" class="hidden">↩ Rechamada</div>
    </div>

    <div id="proximasWrap" style="display:none">
      <div class="prox-label">A seguir</div>
      <div class="prox-chips" id="proximasList"></div>
    </div>
  </main>

  <div id="dicasBar">
    <span id="dicasText"></span>
  </div>

  <footer>
    <div class="ft-label">Últimas</div>
    <div id="strip"><span style="color:rgba(255,255,255,.2);font-size:.85rem">—</span></div>
  </footer>

  <script>

    const socket = io();
    socket.on('update_status', () => {
      if (typeof fetchFullStatus === 'function') fetchFullStatus();
    });

    async function apiCall(method, args = []) {
      const routes = {
        getConfiguracao: { url: '/api/config', method: 'GET' },
        getStatus: { url: '/api/status', method: 'GET' },
        sintetizarVoz: { url: '/api/tts/sintetizar', method: 'POST', keys: ['texto'] }
      };

      const route = routes[method] || { url: `/api/run/${method}`, method: 'POST', keys: ['args'] };

      let options = { method: route.method, headers: { 'Content-Type': 'application/json' } };
      if (route.method !== 'GET') {
        let body = {};
        if (route.keys && route.keys[0] === 'args') {
          body.args = args;
        } else if (route.keys) {
          route.keys.forEach((k, i) => body[k] = args[i]);
        }
        options.body = JSON.stringify(body);
      }

      const res = await fetch(route.url, options);
      return await res.json();
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    (function tick() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR');
      setTimeout(tick, 1000);
    })();

    let _ctx = null, soundEnabled = false;

    function audioCtx() {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      return _ctx;
    }

    function beep() {
      const ctx = audioCtx();
      [[880, 0], [1109, .1], [1319, .2]].forEach(([f, t]) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        const s = ctx.currentTime + t;
        g.gain.setValueAtTime(0, s);
        g.gain.linearRampToValueAtTime(.28, s + .05);
        g.gain.exponentialRampToValueAtTime(.001, s + .9);
        osc.start(s); osc.stop(s + .95);
      });
    }

    function beepRechamada() {
      const ctx = audioCtx();
      [[523, 0], [392, .2], [523, .4]].forEach(([f, t]) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'triangle'; osc.frequency.value = f;
        const s = ctx.currentTime + t;
        g.gain.setValueAtTime(0, s);
        g.gain.linearRampToValueAtTime(.32, s + .03);
        g.gain.exponentialRampToValueAtTime(.001, s + .38);
        osc.start(s); osc.stop(s + .42);
      });
    }

    let _synthResetTimer = null;

    function speak(text, attempt = 1) {
      return new Promise(resolve => {
        if (!window.speechSynthesis) {
          resolve();
          return;
        }

        if (_synthResetTimer) clearTimeout(_synthResetTimer);
        _synthResetTimer = setTimeout(() => {
          window.speechSynthesis.cancel();
          _synthResetTimer = null;
        }, 10 * 60 * 1000);

        window.speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'pt-BR';
        u.rate = 0.9;
        u.pitch = 1;

        const voices = _voices.length ? _voices : window.speechSynthesis.getVoices();
        const isPtBr = lang => lang.replace('_', '-').toLowerCase() === 'pt-br';
        const best = voices.find(v => v.name.includes('Google') && isPtBr(v.lang))
          || voices.find(v => v.name.includes('Microsoft') && isPtBr(v.lang))
          || voices.find(v => isPtBr(v.lang))
          || voices.find(v => v.lang.toLowerCase().startsWith('pt'));
        if (best) u.voice = best;

        let started = false;
        let finished = false;

        u.onstart = () => { started = true; };
        u.onend = () => { finished = true; resolve(); };
        u.onerror = (e) => {
          if (attempt === 1) {
            setTimeout(() => speak(text, 2).then(resolve), 500);
          } else {
            resolve();
          }
        };

        window.speechSynthesis.speak(u);

        setTimeout(() => {
          if (!started && !finished && attempt === 1) {
            window.speechSynthesis.cancel();
            speak(text, 2).then(resolve);
          } else if (!started && !finished && attempt > 1) {
            resolve();
          }
        }, 1500);

        setTimeout(() => {
          if (!finished) {
            window.speechSynthesis.cancel();
            resolve();
          }
        }, 12000);
      });
    }

    function numeroParaExtenso(n) {
      const num = parseInt(n, 10);
      if (isNaN(num) || num < 0) return String(n);
      const un = ['zero', 'um', 'dois', 'três', 'quatro', 'cinco', 'seis', 'sete', 'oito', 'nove',
        'dez', 'onze', 'doze', 'treze', 'catorze', 'quinze', 'dezesseis', 'dezessete', 'dezoito', 'dezenove'];
      const dez = ['', '', 'vinte', 'trinta', 'quarenta', 'cinquenta', 'sessenta', 'setenta', 'oitenta', 'noventa'];
      const cen = ['', 'cem', 'duzentos', 'trezentos', 'quatrocentos', 'quinhentos',
        'seiscentos', 'setecentos', 'oitocentos', 'novecentos'];
      if (num < 20) return un[num];
      if (num < 100) {
        const d = Math.floor(num / 10), u = num % 10;
        return u === 0 ? dez[d] : dez[d] + ' e ' + un[u];
      }
      if (num < 1000) {
        const c = Math.floor(num / 100), r = num % 100;
        if (r === 0) return cen[c];
        const cs = c === 1 ? 'cento' : cen[c];
        if (r < 20) return cs + ' e ' + un[r];
        const d = Math.floor(r / 10), u = r % 10;
        return cs + ' e ' + (u === 0 ? dez[d] : dez[d] + ' e ' + un[u]);
      }
      return String(n);
    }

    function abreviarNome(nome) {
      if (!nome || !nome.trim()) return nome;
      const p = nome.trim().split(/\s+/).filter(Boolean);
      return p.length <= 2 ? p.join(' ') : p[0] + ' ' + p[p.length - 1];
    }

    function _pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function _sanitizeSsml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&apos;');
    }

    /**
     * Gera a mensagem de anúncio de senha.
     *
     * @param {string|number} senha      - Número da senha a ser anunciada.
     * @param {string|number} balcao     - Número do balcão/mesa de destino.
     * @param {boolean}       rechamada  - Indica segunda chamada para a mesma senha.
     * @param {string}        tipo       - Tipo de atendimento: 'aviso', 'ENCAIXE' ou tipo de agenda.
     * @param {string}        nome       - Nome do cidadão (agendamentos nominais); pode ser vazio.
     * @returns {{ ssml: string, plain: string }} Objeto com o texto SSML para a API Google TTS
     *          e o texto simples para o fallback de síntese do navegador.
     */
    function buildMsg(senha, balcao, rechamada, tipo, nome) {
      const sf = numeroParaExtenso(senha);
      const mesas = { '1': 'um', '2': 'dois', '3': 'três', '4': 'quatro', '5': 'cinco', '6': 'seis' };
      const mb = mesas[String(balcao)] || balcao;

      const nomeAbrev = nome && nome.trim() ? abreviarNome(nome) : '';
      const temNome = !!nomeAbrev && nomeAbrev.toLowerCase() !== 'encaixe' && tipo !== 'aviso';
      const ns = temNome ? _sanitizeSsml(nomeAbrev) : '';

      if (tipo === 'aviso') {
        return _pick([
          {
            ssml: `<speak>Atenção. <break time="300ms"/> Senha ${sf}, <break time="300ms"/> compareça à mesa de recepção. <break time="400ms"/> Senha ${sf}.</speak>`,
            plain: `Atenção. Senha ${sf}, compareça à mesa de recepção. Senha ${sf}.`
          },
          {
            ssml: `<speak>Atenção. <break time="350ms"/> Chamada de recepção. <break time="300ms"/> Senha ${sf}. <break time="350ms"/> Por favor comparecer à recepção.</speak>`,
            plain: `Atenção. Chamada de recepção. Senha ${sf}. Por favor comparecer à recepção.`
          }
        ]);
      }

      if (rechamada && temNome) {
        return _pick([
          {
            ssml: `<speak>Atenção. <break time="200ms"/> Segunda chamada para ${ns}. <break time="400ms"/> Mesa ${mb}, por favor.</speak>`,
            plain: `Atenção, segunda chamada. ${nomeAbrev}, por favor dirija-se à mesa ${mb}.`
          },
          {
            ssml: `<speak>Segunda chamada. <break time="300ms"/> ${ns}, <break time="250ms"/> dirija-se à mesa ${mb} imediatamente.</speak>`,
            plain: `Segunda chamada. ${nomeAbrev}, dirija-se à mesa ${mb} imediatamente.`
          },
          {
            ssml: `<speak>Atenção. <break time="250ms"/> ${ns}, <break time="200ms"/> segunda chamada. <break time="350ms"/> Mesa ${mb}.</speak>`,
            plain: `Atenção, ${nomeAbrev}, segunda chamada. Mesa ${mb}.`
          }
        ]);
      }

      if (rechamada) {
        return _pick([
          {
            ssml: `<speak>Atenção. <break time="200ms"/> Segunda chamada. <break time="350ms"/> Senha ${sf}, <break time="300ms"/> mesa ${mb}. <break time="400ms"/> Por favor compareça imediatamente.</speak>`,
            plain: `Atenção, segunda chamada. Senha ${sf}, mesa ${mb}. Por favor compareça imediatamente.`
          },
          {
            ssml: `<speak>Segunda chamada para a senha ${sf}. <break time="400ms"/> Mesa ${mb}. <break time="300ms"/> Compareça imediatamente.</speak>`,
            plain: `Segunda chamada para a senha ${sf}. Mesa ${mb}. Compareça imediatamente.`
          },
          {
            ssml: `<speak>Atenção. <break time="250ms"/> Senha ${sf}, <break time="300ms"/> segunda chamada. <break time="400ms"/> Mesa ${mb}.</speak>`,
            plain: `Atenção. Senha ${sf}, segunda chamada. Mesa ${mb}.`
          }
        ]);
      }

      if (temNome) {
        return _pick([
          {
            ssml: `<speak>Atenção. <break time="300ms"/> ${ns}, <break time="200ms"/> por favor dirija-se à mesa ${mb}.</speak>`,
            plain: `Atenção. ${nomeAbrev}, por favor dirija-se à mesa ${mb}.`
          },
          {
            ssml: `<speak>${ns}. <break time="400ms"/> Seu atendimento será na mesa ${mb}.</speak>`,
            plain: `${nomeAbrev}. Seu atendimento será na mesa ${mb}.`
          },
          {
            ssml: `<speak>Atenção. <break time="300ms"/> Chamada para ${ns}. <break time="400ms"/> Mesa ${mb}.</speak>`,
            plain: `Atenção. Chamada para ${nomeAbrev}. Mesa ${mb}.`
          },
          {
            ssml: `<speak>Atenção. <break time="300ms"/> ${ns}, <break time="200ms"/> comparecer à mesa ${mb}, por favor.</speak>`,
            plain: `Atenção. ${nomeAbrev}, comparecer à mesa ${mb}, por favor.`
          }
        ]);
      }

      return _pick([
        {
          ssml: `<speak>Atenção. <break time="350ms"/> Senha ${sf}. <break time="450ms"/> Mesa ${mb}.</speak>`,
          plain: `Atenção. Senha ${sf}. Mesa ${mb}.`
        },
        {
          ssml: `<speak>Atenção. <break time="300ms"/> Chamada para a senha ${sf}. <break time="400ms"/> Dirija-se à mesa ${mb}.</speak>`,
          plain: `Atenção. Chamada para a senha ${sf}. Dirija-se à mesa ${mb}.`
        },
        {
          ssml: `<speak>Senha ${sf}. <break time="400ms"/> Mesa ${mb}. <break time="350ms"/> Senha ${sf}, mesa ${mb}.</speak>`,
          plain: `Senha ${sf}. Mesa ${mb}. Senha ${sf}, mesa ${mb}.`
        },
        {
          ssml: `<speak>Atenção. <break time="300ms"/> Senha ${sf}, <break time="300ms"/> por favor comparecer à mesa ${mb}.</speak>`,
          plain: `Atenção. Senha ${sf}, por favor comparecer à mesa ${mb}.`
        }
      ]);
    }

    const seenCallIds = new Set();
    let announceQueue = [];
    let announcing = false;
    let initialized = false;
    let currentState = null;
    let _numMesas = 6;

    function _setCallMode(isNamed, senha, nome, tipo, animate) {
      const senhaEl = document.getElementById('senhaNum');
      const nomeWrap = document.getElementById('nomeDisplay');
      const nomeEl = document.getElementById('nomeCallEl');
      const badgeEl = document.getElementById('senhaBadgeEl');
      const topLabel = document.getElementById('callTopLabel');

      if (isNamed) {
        senhaEl.style.display = 'none';
        nomeEl.textContent = abreviarNome(nome).toUpperCase();
        if (animate) { nomeEl.classList.remove('arrive'); void nomeEl.offsetWidth; nomeEl.classList.add('arrive'); }
        badgeEl.textContent = 'Senha ' + String(senha).padStart(2, '0');
        nomeWrap.style.display = 'flex';

        if (topLabel) {
          topLabel.textContent = (tipo === 'ENCAIXE') ? 'Encaixe' : 'Agendamento';
        }
      } else {
        nomeWrap.style.display = 'none';
        senhaEl.textContent = senha;
        if (animate) { senhaEl.classList.remove('arrive'); void senhaEl.offsetWidth; senhaEl.classList.add('arrive'); }
        senhaEl.style.display = '';

        if (topLabel) {
          if (tipo === 'aviso') {
            topLabel.textContent = 'Próxima Senha';
          } else if (tipo === 'ENCAIXE') {
            topLabel.textContent = 'Encaixe';
          } else {
            topLabel.textContent = 'Agendamento';
          }
        }
      }
    }

    function showCallUI(call) {
      const nomeReal = call.nome && call.nome.trim() && call.nome !== 'Encaixe';
      const isNamed = !!(nomeReal && call.tipo !== 'aviso');
      const dirLabel = document.getElementById('callDirLabel');

      _setCallMode(isNamed, call.senha, call.nome, call.tipo, true);

      if (call.tipo === 'aviso') {
        if (dirLabel) dirLabel.textContent = 'Aguarde ser chamado';
        document.getElementById('mesaNum').textContent = '—';
      } else {
        if (dirLabel) dirLabel.textContent = 'Dirija-se à';
        document.getElementById('mesaNum').textContent = `Mesa ${call.balcao}`;
      }

      document.getElementById('rechamadaBadge').classList.toggle('hidden', !call.rechamada);
      document.getElementById('idleWrap').style.display = 'none';
      document.getElementById('callWrap').style.opacity = '1';
      document.getElementById('callWrap').style.display = 'flex';
    }

    function speakTTS(msg) {
      const ssml  = (msg && typeof msg === 'object') ? msg.ssml  : String(msg);
      const plain = (msg && typeof msg === 'object') ? msg.plain : String(msg);

      return new Promise(resolve => {
        let done = false;

        const timeout = setTimeout(() => {
          if (done) return;
          done = true;
          speak(plain).then(resolve);
        }, 6000);

        apiCall('sintetizarVoz', [ssml]).then(r => {
          if (done) return;
          done = true;
          clearTimeout(timeout);
          if (!r.ok || !r.audio) { speak(plain).catch(() => { }); return; }
          try {
            const ctx = audioCtx();
            const bytes = Uint8Array.from(atob(r.audio), c => c.charCodeAt(0));
            ctx.decodeAudioData(bytes.buffer,
              buffer => {
                const src = ctx.createBufferSource();
                src.buffer = buffer;
                src.connect(ctx.destination);
                src.onended = resolve;
                src.start(0);
              },
              () => { speak(plain).then(resolve); }
            );
          } catch (e) { speak(plain).then(resolve); }
        })
          .catch(() => {
            if (done) return;
            done = true;
            clearTimeout(timeout);
            speak(plain).then(resolve);
          });
      });
    }

    function processQueue() {
      if (announceQueue.length === 0) {
        announcing = false;
        document.getElementById('callWrap').classList.remove('calling');
        if (currentState) applyStaticUI(currentState);
        return;
      }
      announcing = true;
      const call = announceQueue.shift();
      showCallUI(call);
      document.getElementById('callWrap').classList.add('calling');
      flash();
      if (soundEnabled) {
        if (call.rechamada) beepRechamada(); else beep();
        Promise.race([
          speakTTS(buildMsg(call.senha, call.balcao, call.rechamada, call.tipo, call.nome)),
          new Promise(r => setTimeout(r, 7000))
        ]).then(() => setTimeout(processQueue, 800));
      } else {
        setTimeout(processQueue, 5000);
      }
    }

    function enqueueCalls(hist) {
      const newCalls = hist.filter(c => !seenCallIds.has(c.id));
      newCalls.sort((a, b) => a.at - b.at);
      newCalls.forEach(c => seenCallIds.add(c.id));
      if (newCalls.length === 0) return;

      const toAnnounce = newCalls.length > 8 ? [newCalls[newCalls.length - 1]] : newCalls;
      announceQueue.push(...toAnnounce);
      if (!announcing) processQueue();
    }

    function flash() {
      const v = document.getElementById('flashVeil');
      v.classList.remove('flash');
      void v.offsetWidth;
      v.classList.add('flash');
    }

    function applyStaticUI(s) {
      const hasCall = !!s.ultima_senha && s.ultima_senha !== 'null' && s.ultima_senha !== 'undefined' && s.ultima_senha !== '';
      document.getElementById('idleWrap').style.display = hasCall ? 'none' : 'flex';
      document.getElementById('callWrap').style.display = hasCall ? 'flex' : 'none';

      if (hasCall) {
        const dirLabel = document.getElementById('callDirLabel');
        const isAviso = s.ultimo_balcao === 'Recepção';
        const nomeRealStatic = s.ultimo_nome && s.ultimo_nome.trim() && s.ultimo_nome !== 'Encaixe';
        const isNamed = !!(nomeRealStatic && !isAviso);

        _setCallMode(isNamed, s.ultima_senha, s.ultimo_nome, isAviso ? 'aviso' : s.ultimo_tipo_agenda, false);

        if (dirLabel) dirLabel.textContent = isAviso ? 'Aguarde ser chamado' : 'Dirija-se à';

        const atd = s.ultimo_atendente && s.ultimo_atendente !== 'undefined' && s.ultimo_atendente !== 'Recepção';
        const nomeAtend = atd && s.ultimo_atendente.length > 20
          ? s.ultimo_atendente.split(' ')[0] : s.ultimo_atendente;
        const mesaTxt = isAviso ? '—' : (atd ? `Mesa ${s.ultimo_balcao} · ${nomeAtend || ''}` : `Mesa ${s.ultimo_balcao}`);
        document.getElementById('mesaNum').textContent = mesaTxt;
        document.getElementById('rechamadaBadge').classList.toggle('hidden', !s.ultima_rechamada);

        const callAge = s.ultima_at ? Date.now() - Number(s.ultima_at) : 0;
        document.getElementById('callWrap').style.opacity = callAge > _STALE_MS ? '0.45' : '1';
      }
    }

    const _LONGO_MS = 40 * 60 * 1000;
    const _STALE_MS = 20 * 60 * 1000;

    function calcmesaStatus(ultimas, hist) {
      const agora = Date.now();
      const hojeMs = new Date().setHours(0, 0, 0, 0);
      const vistos = new Set();
      if (hist) hist.forEach(c => {
        if (c.at >= hojeMs && c.balcao !== 'Recepção') vistos.add(String(c.balcao));
      });
      const atendendo = new Set();
      const emAtend = {};
      if (ultimas) ultimas.forEach(c => {
        const k = String(c.balcao);
        atendendo.add(k);
        if (c.chamado_ms > 0) emAtend[k] = c.chamado_ms;
      });
      return Array.from({ length: _numMesas }, (_, i) => i + 1).map(b => {
        const k = String(b);
        if (atendendo.has(k)) {
          const tsMs = emAtend[k];
          const el = (tsMs && agora > tsMs) ? agora - tsMs : null;
          return { b, estado: 'atendendo', elapsed: el };
        }
        return { b, estado: vistos.has(k) ? 'disponivel' : 'inativo', elapsed: 0 };
      });
    }

    function fmtElapsed(ms) {
      if (ms == null || ms <= 0) return '';
      const m = Math.floor(ms / 60000);
      return m < 1 ? '<1m' : m + 'min';
    }

    function renderBalcoesDisplay(ultimas, hist) {
      const strip = document.getElementById('balcoesStrip');
      if (!strip) return;
      const lbls = { inativo: 'inativo', disponivel: 'livre' };

      const st = calcmesaStatus(ultimas, hist).filter(m => m.estado !== 'inativo');

      strip.innerHTML = st.map(({ b, estado, elapsed }) => {
        let sub;
        if (estado === 'atendendo') {
          const longo = elapsed != null && elapsed >= _LONGO_MS;
          const tempoStr = elapsed != null && elapsed > 0 ? fmtElapsed(elapsed) : '';
          sub = tempoStr ? (tempoStr + (longo ? ' (!)' : '')) : 'atend.';
        } else {
          sub = lbls[estado] ?? estado;
        }
        return `<div class="bs-card b-${estado}"><span class="bs-num">M${b}</span><span class="bs-sub">${sub}</span></div>`;
      }).join('');
    }

    function updateDisplay(s) {
      currentState = s;

      document.getElementById('filaCount').textContent = s.na_fila ?? '—';
      document.getElementById('previsaoHora').textContent = s.previsao ?? '--:--';

      if (!initialized) {
        if (s.hist) s.hist.forEach(c => seenCallIds.add(c.id));
        initialized = true;
        applyStaticUI(s);
      } else {
        if (s.hist && s.hist.length) enqueueCalls(s.hist);
        if (!announcing) applyStaticUI(s);
      }

      renderBalcoesDisplay(s.ultimas, s.hist);

      const proxWrap = document.getElementById('proximasWrap');
      const proxList = document.getElementById('proximasList');
      if (proxWrap && proxList && s.proximas && s.proximas.length > 0) {
        proxList.innerHTML = s.proximas.map(p => {
          const nome = p.nome && p.nome.trim() && p.nome.toLowerCase() !== 'encaixe'
            ? p.nome.trim().split(/\s+/)[0]
            : (p.nome && p.nome.trim() ? p.nome.trim() : String(p.senha).padStart(2, '0'));
          return `<span class="prox-chip">${esc(nome)}</span>`;
        }).join('');
        proxWrap.style.display = 'flex';
      } else if (proxWrap) {
        proxWrap.style.display = 'none';
      }

      const hasCall = !!s.ultima_senha && s.ultima_senha !== '' &&
        s.ultima_senha !== 'null' && s.ultima_senha !== 'undefined';
      if (!hasCall) {
        const numAtend = s.ultimas ? s.ultimas.length : 0;
        const numFila = s.na_fila ?? 0;
        const statsEl = document.getElementById('idleStats');
        const atendEl = document.getElementById('idleAtend');
        const filaEl = document.getElementById('idleFila');
        if (atendEl) atendEl.textContent = numAtend;
        if (filaEl) filaEl.textContent = numFila;
        if (statsEl) statsEl.style.display = (numAtend > 0 || numFila > 0) ? 'flex' : 'none';
      }

      if (s.ultimas && s.ultimas.length) {
        document.getElementById('strip').innerHTML = s.ultimas.map(c => `
      <div class="chip">
        <span class="chip-s">${esc(String(c.senha).padStart(2, '0'))}</span>
        <span class="chip-b">${c.balcao === 'Recepção' ? 'REC' : 'M' + esc(String(c.balcao))}</span>
        ${Number(c.rechamadas) > 0 ? `<span class="chip-r">↩${Number(c.rechamadas)}</span>` : ''}
      </div>`).join('');
      }
    }


    let _fullFetching = false;

    function fetchFullStatus() {
      if (_fullFetching) return;
      _fullFetching = true;
      apiCall('getStatus', []).then(s => {
        _fullFetching = false;
        document.getElementById('clock').style.color = '';
        updateDisplay(s);
      }).catch(() => { _fullFetching = false; });
    }

    let _voices = [];
    if (window.speechSynthesis) {
      _voices = speechSynthesis.getVoices();
      speechSynthesis.addEventListener('voiceschanged', () => { _voices = speechSynthesis.getVoices(); });
    }

    const dicasCadUnico = [
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> DICA: Mantenha seu Cadastro Único atualizado a cada 2 anos para não perder seus benefícios.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> ATENÇÃO: Mudou de endereço ou alguém da família começou a trabalhar? Atualize seu cadastro!`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> BOLSA FAMÍLIA: A vacinação das crianças e a pesagem no posto de saúde são obrigatórias.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> EDUCAÇÃO: Crianças e adolescentes precisam estar na escola. A falta de frequência bloqueia o benefício.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> PRATICIDADE: Baixe o app Meu CadÚnico e consulte sua situação pelo celular, sem precisar de fila.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> TARIFA SOCIAL: Você sabia que o CadÚnico pode dar um bom desconto na sua conta de luz e água?`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> ID JOVEM: Jovens de 15 a 29 anos podem viajar para fora do estado de graça ou com desconto usando o CadÚnico.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> DOCUMENTOS: Vai atualizar o cadastro? Não esqueça CPF, RG, comprovante de residência e declaração escolar de todos.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> BPC/LOAS: Idosos acima de 65 anos e pessoas com deficiência precisam do CadÚnico atualizado para receber.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> SEGURANÇA: O seu NIS (Número de Identificação Social) é pessoal. Guarde-o bem e não passe para estranhos.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> ALERTA DE GOLPE: Nunca confie em links de WhatsApp prometendo dinheiro. Informação oficial é no app gov.br.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> TELEFONE: Trocou o número do celular? Atualize com a gente. O governo manda avisos importantes por SMS.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> NASCIMENTO: Bebê novo na família? Traga a certidão de nascimento para incluí-lo no seu cadastro o quanto antes.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> OPORTUNIDADE: O Cadastro Único é a porta de entrada para mais de 30 programas sociais, não apenas um.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> CARTEIRA DE TRABALHO: Alguém da casa perdeu o emprego? Atualizar a nova renda familiar pode liberar benefícios.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> APOSENTADORIA: Donas de casa de baixa renda podem pagar o INSS mais barato usando o Cadastro Único.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> PREVENÇÃO: Evite dores de cabeça. Não espere o benefício ser bloqueado para vir conversar com a gente.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> REGRAS: Só pode haver um Responsável Familiar por casa. Essa pessoa deve ter pelo menos 16 anos, de preferência mulher.`,
      `<span class="material-symbols-rounded" style="color: var(--highlight); margin-right: 8px;">lightbulb</span> DÚVIDAS?: Nossos entrevistadores estão aqui para ajudar você. Pergunte tudo o que precisar, é um direito seu!`
    ];

    let dicaAtual = 0;
    const dicasTextEl = document.getElementById('dicasText');

    function rotacionarDicas() {
      dicasTextEl.style.opacity = '0';
      dicasTextEl.style.transform = 'translateY(-15px)';

      setTimeout(() => {
        dicaAtual = (dicaAtual + 1) % dicasCadUnico.length;
        dicasTextEl.innerHTML = dicasCadUnico[dicaAtual];

        dicasTextEl.style.transition = 'none';
        dicasTextEl.style.transform = 'translateY(15px)';

        void dicasTextEl.offsetWidth;

        dicasTextEl.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        dicasTextEl.style.opacity = '1';
        dicasTextEl.style.transform = 'translateY(0)';
      }, 500);
    }

    dicasTextEl.innerHTML = dicasCadUnico[0];
    dicasTextEl.style.opacity = '1';
    dicasTextEl.style.transform = 'translateY(0)';
    setInterval(rotacionarDicas, 10000);

    apiCall('getConfiguracao')
      .then(cfg => {
        _numMesas = cfg.num_mesas || 6;
        const strip = document.getElementById('balcoesStrip');
        if (strip) {
          strip.innerHTML = Array.from({ length: _numMesas }, (_, i) => i + 1)
            .map(b => `<div class="bs-card b-inativo"><span class="bs-num">M${b}</span><span class="bs-sub">inativo</span></div>`)
            .join('');
        }
        fetchFullStatus();
      })
      .catch(() => fetchFullStatus());





    document.getElementById('startOverlay').addEventListener('click', function () {
      audioCtx();
      soundEnabled = true;
      if (window.speechSynthesis) _voices = window.speechSynthesis.getVoices();
      this.classList.add('fade');
      setTimeout(() => this.remove(), 600);
    });

  </script>
</body>
